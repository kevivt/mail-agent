<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Mail Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #14161c;
    --panel: #1b1e26;
    --panel-raised: #21242e;
    --border: #2a2e3a;
    --text: #ece9e1;
    --text-dim: #8b8f9e;
    --text-faint: #565b6b;

    --job: #d4a24c;
    --job-dim: #6b5a34;
    --job-bg: rgba(212, 162, 76, 0.08);

    --corp: #7e8ba3;
    --corp-dim: #4a5364;
    --corp-bg: rgba(126, 139, 163, 0.07);

    --priv: #a97fc4;
    --priv-dim: #5c4a6b;
    --priv-bg: rgba(169, 127, 196, 0.08);

    --radius: 10px;
  }

  * { box-sizing: border-box; }

  body {
    font-family: 'Space Grotesk', sans-serif;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 15% 0%, rgba(212, 162, 76, 0.04), transparent 40%),
      radial-gradient(circle at 85% 10%, rgba(126, 139, 163, 0.05), transparent 45%);
    color: var(--text);
    margin: 0;
    padding: 2.5rem 2.5rem 0;
    min-height: 100vh;
  }

  .mono { font-family: 'IBM Plex Mono', monospace; }

  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    flex-wrap: wrap;
    gap: 1rem;
    margin-bottom: 1.75rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .brand h1 {
    font-size: 1.35rem;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin: 0;
  }

  .brand .tagline {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    color: var(--text-faint);
    margin-top: 0.3rem;
    letter-spacing: 0.02em;
  }

  .sync-indicator {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.78rem;
    color: var(--text-dim);
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 0.45rem 0.9rem 0.45rem 0.7rem;
  }

  .pulse-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--job);
    box-shadow: 0 0 0 0 rgba(212, 162, 76, 0.6);
    animation: pulse 2.4s ease-out infinite;
  }

  @media (prefers-reduced-motion: reduce) {
    .pulse-dot { animation: none; }
  }

  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(212, 162, 76, 0.55); }
    70%  { box-shadow: 0 0 0 7px rgba(212, 162, 76, 0); }
    100% { box-shadow: 0 0 0 0 rgba(212, 162, 76, 0); }
  }

  .actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
  }

  #markAllBtn {
    background: var(--panel-raised);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 0.55rem 1.1rem;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 500;
    font-size: 0.85rem;
    cursor: pointer;
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  #markAllBtn:hover { border-color: var(--text-faint); background: #262a35; }
  #markAllBtn:disabled { opacity: 0.5; cursor: default; }
  #markAllBtn:focus-visible { outline: 2px solid var(--job); outline-offset: 2px; }

  .count-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.78rem;
    color: var(--text-faint);
  }

  .columns {
    display: grid;
    grid-template-columns: 1.4fr 1fr 1fr;
    gap: 1.1rem;
    align-items: start;
  }

  @media (max-width: 820px) {
    .columns { grid-template-columns: 1fr; }
  }

  .column {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.1rem 1.1rem 0.4rem;
    overflow: hidden;
  }

  .column-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.9rem;
  }

  .column-head h2 {
    font-size: 0.92rem;
    font-weight: 600;
    margin: 0;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .job_application .dot { background: var(--job); }
  .corporate .dot { background: var(--corp); }
  .private .dot { background: var(--priv); }

  .column-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    color: var(--text-faint);
    background: var(--panel-raised);
    border-radius: 999px;
    padding: 0.15rem 0.55rem;
  }

  .job_application { border-top: 2px solid var(--job); }
  .corporate { border-top: 2px solid var(--corp); }
  .private { border-top: 2px solid var(--priv); }

  .email {
    border-bottom: 1px solid var(--border);
    padding: 0.75rem 0.1rem;
  }
  .email:last-child { border-bottom: none; }

  .subject {
    font-weight: 500;
    font-size: 0.88rem;
    line-height: 1.35;
    margin-bottom: 0.3rem;
  }

  .sender {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .empty {
    color: var(--text-faint);
    font-size: 0.82rem;
    font-family: 'IBM Plex Mono', monospace;
    padding: 1.4rem 0.1rem 1.6rem;
  }

  footer {
    margin-top: 2rem;
    padding: 0.9rem 0;
    border-top: 1px solid var(--border);
  }

  .terminal-line {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-faint);
  }

  .terminal-line .prompt { color: var(--job); margin-right: 0.4rem; }
</style>
</head>
<body>
  <header>
    <div class="brand">
      <h1>Mail Agent</h1>
      <div class="tagline">local · zero-cost · llama3.2:3b</div>
    </div>
    <div class="sync-indicator">
      <span class="pulse-dot"></span>
      <span id="statusText">loading…</span>
    </div>
  </header>

  <div class="actions">
    <span class="count-label" id="countLabel"></span>
    <button id="markAllBtn" onclick="markAllRead()">Mark all as read</button>
  </div>

  <div class="columns">
    <div class="column job_application">
      <div class="column-head">
        <h2><span class="dot"></span>Job Applications</h2>
        <span class="column-count" id="count-job_application">0</span>
      </div>
      <div id="job_application"></div>
    </div>
    <div class="column corporate">
      <div class="column-head">
        <h2><span class="dot"></span>Corporate</h2>
        <span class="column-count" id="count-corporate">0</span>
      </div>
      <div id="corporate"></div>
    </div>
    <div class="column private">
      <div class="column-head">
        <h2><span class="dot"></span>Private</h2>
        <span class="column-count" id="count-private">0</span>
      </div>
      <div id="private"></div>
    </div>
  </div>

  <footer>
    <div class="terminal-line"><span class="prompt">&gt;</span><span id="terminalText">waiting for first sync…</span></div>
  </footer>

<script>
function formatTime(iso) {
  if (!iso) return "";
  const d = new Date(iso + "Z");
  if (isNaN(d)) return "";
  return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
}

async function loadInbox() {
  const res = await fetch("/inbox");
  const data = await res.json();
  const buckets = { job_application: [], corporate: [], private: [] };
  data.emails.forEach(e => {
    if (buckets[e.category]) buckets[e.category].push(e);
  });

  for (const cat of Object.keys(buckets)) {
    const el = document.getElementById(cat);
    document.getElementById(`count-${cat}`).textContent = buckets[cat].length;
    el.innerHTML = buckets[cat].length
      ? buckets[cat].map(e => `
          <div class="email">
            <div class="subject">${escapeHtml(e.subject)}</div>
            <div class="sender">${escapeHtml(e.sender)}</div>
          </div>`).join("")
      : `<div class="empty">nothing here</div>`;
  }

  const now = new Date().toLocaleTimeString();
  document.getElementById("statusText").textContent = `synced ${now}`;
  document.getElementById("countLabel").textContent =
    `${data.count} unread today`;
  document.getElementById("terminalText").textContent =
    `sync ok · ${data.count} active · last check ${now}`;
}

async function markAllRead() {
  const btn = document.getElementById("markAllBtn");
  btn.disabled = true;
  btn.textContent = "Marking…";
  document.getElementById("terminalText").textContent = "marking all as read…";
  const res = await fetch("/mark_all_read", { method: "POST" });
  const result = await res.json();
  await loadInbox();
  btn.disabled = false;
  btn.textContent = "Mark all as read";
  document.getElementById("terminalText").textContent =
    `marked ${result.marked_read} read · ${result.sync_result.total_active} active remaining`;
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

loadInbox();
setInterval(loadInbox, 15000);
</script>
</body>
</html>
